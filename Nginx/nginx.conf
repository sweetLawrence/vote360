events {}

http {
    client_max_body_size 20M;

    map $http_origin $cors_origin {
        default "";
        "~^http://localhost:3000$"  "$http_origin";
        "~^http://localhost:5173$"  "$http_origin";  # Vite dev server
        "~^https?://([^/]+\.)?votetrace360\.com$" "$http_origin";
    }

    log_format main '$remote_addr - $request_method [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 20M;

        location /internal/ {
            deny all;
            return 403 '{"error": "Forbidden"}';
            add_header Content-Type application/json;
        }

        location /api/v1/candidates/ {
            proxy_pass http://reconciliation:3004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  $cors_origin;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
                add_header 'Access-Control-Max-Age'       1728000;
                add_header 'Content-Type'                 'text/plain; charset=UTF-8';
                add_header 'Content-Length'               0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
            add_header 'Vary' 'Origin' always;
        }

        location /api/v1/physical/ {
            proxy_pass http://physical:3001/api/v1/physical/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  $cors_origin;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, x-bot-secret' always;
                add_header 'Access-Control-Max-Age'       1728000;
                add_header 'Content-Type'                 'text/plain; charset=UTF-8';
                add_header 'Content-Length'               0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, x-bot-secret' always;
            add_header 'Vary' 'Origin' always;
        }

        location /api/v1/digital/ {
            proxy_pass http://digital-spend:3002/api/v1/digital/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  $cors_origin;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, x-admin-key' always;
                add_header 'Access-Control-Max-Age'       1728000;
                add_header 'Content-Type'                 'text/plain; charset=UTF-8';
                add_header 'Content-Length'               0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, x-admin-key' always;
            add_header 'Vary' 'Origin' always;
        }

        location /api/v1/donors/ {
            proxy_pass http://donor:3003/api/v1/donors/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'  $cors_origin;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, x-admin-key' always;
                add_header 'Access-Control-Max-Age'       1728000;
                add_header 'Content-Type'                 'text/plain; charset=UTF-8';
                add_header 'Content-Length'               0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, x-admin-key' always;
            add_header 'Vary' 'Origin' always;
        }

        location /health/reconciliation/ {
            proxy_pass http://reconciliation:3004/health/;
            proxy_set_header Host $host;
            access_log off;
        }

        location /health/physical/ {
            proxy_pass http://physical:3001/health;
            proxy_set_header Host $host;
            access_log off;
        }

        location /health/digital/ {
            proxy_pass http://digital-spend:3002/health;
            proxy_set_header Host $host;
            access_log off;
        }

        location /health/donors/ {
            proxy_pass http://donor:3003/health;
            proxy_set_header Host $host;
            access_log off;
        }

        location / {
            return 404 '{"error": "Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
